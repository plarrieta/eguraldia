name: Lau estazioen konparazioa

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lau-estazioen-konparazioa
  cancel-in-progress: false

jobs:
  konparatu:
    runs-on: ubuntu-latest

    steps:
      - name: Biltegia jaitsi
        uses: actions/checkout@v4

      - name: Python prestatu
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lau estazioak konparatu
        run: python tmp/diagnostikoa_lau_estazioak.py

      - name: Txostenak GitHubera igo
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tmp/lau_estazioen_konparazioa.json
          git add tmp/lau_estazioen_konparazioa.csv

          if git diff --cached --quiet; then
            echo "Ez dago aldaketarik."
            exit 0
          fi

          git commit -m "Lau estazioen konparazio-txostena eguneratu"
          git push
